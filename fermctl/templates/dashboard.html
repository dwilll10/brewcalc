<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FermCtl Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .stat-card { min-width: 120px; }
        .stat-card .value { font-size: 2rem; font-weight: bold; }
        .stat-card .label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .indicator { display: inline-block; width: 12px; height: 12px; border-radius: 50%; }
        .indicator.on { background-color: #dc3545; animation: pulse 1s infinite; }
        .indicator.off { background-color: #6c757d; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <nav class="navbar bg-body-tertiary mb-4">
        <div class="container">
            <span class="navbar-brand fw-bold">FermCtl</span>
            <span class="text-muted small" id="status-badge">Connecting...</span>
        </div>
    </nav>

    <div class="container">
        <!-- Status Cards -->
        <div class="row g-3 mb-4">
            <div class="col-auto">
                <div class="card stat-card text-center">
                    <div class="card-body">
                        <div class="label text-muted">Current</div>
                        <div class="value" id="current-temp">--</div>
                        <div class="small text-muted">&deg;F</div>
                    </div>
                </div>
            </div>
            <div class="col-auto">
                <div class="card stat-card text-center">
                    <div class="card-body">
                        <div class="label text-muted">Target</div>
                        <div class="value" id="target-temp">--</div>
                        <div class="small text-muted">&deg;F</div>
                    </div>
                </div>
            </div>
            <div class="col-auto">
                <div class="card stat-card text-center">
                    <div class="card-body">
                        <div class="label text-muted">Elapsed</div>
                        <div class="value" id="elapsed">--</div>
                        <div class="small text-muted">hours</div>
                    </div>
                </div>
            </div>
            <div class="col-auto">
                <div class="card stat-card text-center">
                    <div class="card-body">
                        <div class="label text-muted">Heat</div>
                        <div class="mt-2"><span class="indicator off" id="heat-indicator"></span></div>
                    </div>
                </div>
            </div>
            <div class="col-auto">
                <div class="card stat-card text-center">
                    <div class="card-body">
                        <div class="label text-muted">Cool</div>
                        <div class="mt-2"><span class="indicator off" id="cool-indicator"></span></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Temperature Chart -->
        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Temperature History</h5>
                <div>
                    <button class="btn btn-sm btn-outline-secondary" onclick="loadReadings('1h')">1h</button>
                    <button class="btn btn-sm btn-outline-secondary" onclick="loadReadings('6h')">6h</button>
                    <button class="btn btn-sm btn-outline-secondary active" onclick="loadReadings('24h')">24h</button>
                    <button class="btn btn-sm btn-outline-secondary" onclick="loadReadings('all')">All</button>
                </div>
            </div>
            <div class="card-body">
                <canvas id="temp-chart" height="300"></canvas>
            </div>
        </div>

        <!-- Controls -->
        <div class="row g-3 mb-4">
            <!-- Manual Override -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">Manual Override</div>
                    <div class="card-body">
                        <div class="input-group mb-2">
                            <input type="number" class="form-control" id="override-temp" placeholder="Temp (F)" step="0.5" min="50" max="85">
                            <span class="input-group-text">&deg;F</span>
                        </div>
                        <div class="d-flex gap-2">
                            <button class="btn btn-warning btn-sm flex-fill" onclick="setOverride()">Set Override</button>
                            <button class="btn btn-outline-secondary btn-sm flex-fill" onclick="clearOverride()">Clear</button>
                        </div>
                        <div class="small text-muted mt-2" id="override-status"></div>
                    </div>
                </div>
            </div>

            <!-- Start/Stop Run -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">Fermentation Run</div>
                    <div class="card-body">
                        <div class="mb-2">
                            <input type="text" class="form-control form-control-sm" id="run-name" placeholder="Recipe name">
                        </div>
                        <div class="mb-2">
                            <input type="number" class="form-control form-control-sm" id="run-temp" placeholder="Target temp (F)" value="66" step="0.5">
                        </div>
                        <div class="d-flex gap-2">
                            <button class="btn btn-success btn-sm flex-fill" id="start-btn" onclick="startRun()">Start</button>
                            <button class="btn btn-danger btn-sm flex-fill" id="stop-btn" onclick="stopRun()" disabled>Stop</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Run History -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">Recent Runs</div>
                    <div class="card-body p-0">
                        <div class="list-group list-group-flush" id="run-history">
                            <div class="list-group-item text-muted small">Loading...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/dashboard.js"></script>
</body>
</html>
