{% extends "admin/base_admin.html" %}
{% block admin_title %}Yeasts{% endblock %}

{% block admin_content %}
<!-- Add form -->
<div class="card mb-4">
    <div class="card-header">Add Yeast</div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('admin.add_yeast') }}" class="row g-2 align-items-end">
            <div class="col-md-2">
                <label class="form-label">Name</label>
                <input type="text" class="form-control form-control-sm" name="name" required>
            </div>
            <div class="col-md-1">
                <label class="form-label">Lab</label>
                <input type="text" class="form-control form-control-sm" name="lab">
            </div>
            <div class="col-md-1">
                <label class="form-label">Code</label>
                <input type="text" class="form-control form-control-sm" name="code">
            </div>
            <div class="col-md-1">
                <label class="form-label">Atten.</label>
                <input type="number" class="form-control form-control-sm" name="attenuation" step="0.01" value="0.75" required>
            </div>
            <div class="col-md-1">
                <label class="form-label">Temp Lo</label>
                <input type="number" class="form-control form-control-sm" name="temp_low" step="1" value="60" required>
            </div>
            <div class="col-md-1">
                <label class="form-label">Temp Hi</label>
                <input type="number" class="form-control form-control-sm" name="temp_high" step="1" value="72" required>
            </div>
            <div class="col-md-1">
                <label class="form-label">Type</label>
                <select class="form-select form-select-sm" name="type">
                    <option value="ale">Ale</option>
                    <option value="lager">Lager</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Notes</label>
                <input type="text" class="form-control form-control-sm" name="notes">
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary btn-sm w-100">Add</button>
            </div>
        </form>
    </div>
</div>

<!-- List -->
<div class="table-responsive">
    <table class="table table-sm table-hover">
        <thead>
            <tr>
                <th>Name</th>
                <th>Lab</th>
                <th>Code</th>
                <th>Atten.</th>
                <th>Temp Range</th>
                <th>Type</th>
                <th>Notes</th>
                <th style="width: 140px">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for item in items %}
            <tr>
                <form method="POST" action="{{ url_for('admin.edit_yeast', item_id=item.id) }}">
                    <td><input type="text" class="form-control form-control-sm" name="name" value="{{ item.name }}"></td>
                    <td><input type="text" class="form-control form-control-sm" name="lab" value="{{ item.lab or '' }}" style="width: 80px"></td>
                    <td><input type="text" class="form-control form-control-sm" name="code" value="{{ item.code or '' }}" style="width: 70px"></td>
                    <td><input type="number" class="form-control form-control-sm" name="attenuation" value="{{ item.attenuation }}" step="0.01" style="width: 70px"></td>
                    <td class="d-flex gap-1">
                        <input type="number" class="form-control form-control-sm" name="temp_low" value="{{ item.temp_low }}" step="1" style="width: 60px">
                        <span class="align-self-center">-</span>
                        <input type="number" class="form-control form-control-sm" name="temp_high" value="{{ item.temp_high }}" step="1" style="width: 60px">
                    </td>
                    <td>
                        <select class="form-select form-select-sm" name="type" style="width: 75px">
                            <option value="ale" {{ 'selected' if item.type == 'ale' }}>Ale</option>
                            <option value="lager" {{ 'selected' if item.type == 'lager' }}>Lager</option>
                        </select>
                    </td>
                    <td><input type="text" class="form-control form-control-sm" name="notes" value="{{ item.notes or '' }}"></td>
                    <td>
                        <div class="d-flex gap-1">
                            <button type="submit" class="btn btn-outline-primary btn-sm">Save</button>
                </form>
                            <form method="POST" action="{{ url_for('admin.delete_yeast', item_id=item.id) }}"
                                  onsubmit="return confirm('Delete {{ item.name }}?')">
                                <button type="submit" class="btn btn-outline-danger btn-sm">Del</button>
                            </form>
                        </div>
                    </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<p class="text-muted small">{{ items|length }} yeasts</p>
{% endblock %}
