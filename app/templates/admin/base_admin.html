{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>{% block admin_title %}Admin{% endblock %}</h1>
</div>

<ul class="nav nav-tabs mb-4">
    <li class="nav-item">
        <a class="nav-link {{ 'active' if request.path.startswith('/admin/fermentables') }}" href="{{ url_for('admin.fermentables') }}">Fermentables</a>
    </li>
    <li class="nav-item">
        <a class="nav-link {{ 'active' if request.path.startswith('/admin/hops') }}" href="{{ url_for('admin.hops') }}">Hops</a>
    </li>
    <li class="nav-item">
        <a class="nav-link {{ 'active' if request.path.startswith('/admin/yeasts') }}" href="{{ url_for('admin.yeasts') }}">Yeasts</a>
    </li>
    <li class="nav-item">
        <a class="nav-link {{ 'active' if request.path.startswith('/admin/styles') }}" href="{{ url_for('admin.styles') }}">Styles</a>
    </li>
</ul>

{% block admin_content %}{% endblock %}
{% endblock %}
