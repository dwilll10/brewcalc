{% extends "admin/base_admin.html" %}
{% block admin_title %}Hops{% endblock %}

{% block admin_content %}
<!-- Add form -->
<div class="card mb-4">
    <div class="card-header">Add Hop</div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('admin.add_hop') }}" class="row g-2 align-items-end">
            <div class="col-md-3">
                <label class="form-label">Name</label>
                <input type="text" class="form-control form-control-sm" name="name" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">Alpha Acid %</label>
                <input type="number" class="form-control form-control-sm" name="alpha_acid" step="0.1" value="10.0" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">Type</label>
                <select class="form-select form-select-sm" name="type">
                    <option value="dual">Dual Purpose</option>
                    <option value="bittering">Bittering</option>
                    <option value="aroma">Aroma</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Notes</label>
                <input type="text" class="form-control form-control-sm" name="notes">
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary btn-sm w-100">Add</button>
            </div>
        </form>
    </div>
</div>

<!-- List -->
<div class="table-responsive">
    <table class="table table-sm table-hover">
        <thead>
            <tr>
                <th>Name</th>
                <th>Alpha Acid %</th>
                <th>Type</th>
                <th>Notes</th>
                <th style="width: 140px">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for item in items %}
            <tr>
                <form method="POST" action="{{ url_for('admin.edit_hop', item_id=item.id) }}">
                    <td><input type="text" class="form-control form-control-sm" name="name" value="{{ item.name }}"></td>
                    <td><input type="number" class="form-control form-control-sm" name="alpha_acid" value="{{ item.alpha_acid }}" step="0.1"></td>
                    <td>
                        <select class="form-select form-select-sm" name="type">
                            <option value="dual" {{ 'selected' if item.type == 'dual' }}>Dual Purpose</option>
                            <option value="bittering" {{ 'selected' if item.type == 'bittering' }}>Bittering</option>
                            <option value="aroma" {{ 'selected' if item.type == 'aroma' }}>Aroma</option>
                        </select>
                    </td>
                    <td><input type="text" class="form-control form-control-sm" name="notes" value="{{ item.notes or '' }}"></td>
                    <td>
                        <div class="d-flex gap-1">
                            <button type="submit" class="btn btn-outline-primary btn-sm">Save</button>
                </form>
                            <form method="POST" action="{{ url_for('admin.delete_hop', item_id=item.id) }}"
                                  onsubmit="return confirm('Delete {{ item.name }}?')">
                                <button type="submit" class="btn btn-outline-danger btn-sm">Del</button>
                            </form>
                        </div>
                    </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<p class="text-muted small">{{ items|length }} hops</p>
{% endblock %}
